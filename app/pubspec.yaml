name: kasa_setup
description: No-login Wi-Fi provisioning for TP-Link Kasa HS300 smart power strips.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.11.5
  flutter: ">=3.41.9"

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^11.3.1
  crypto: ^3.0.5
  pointycastle: ^3.9.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
